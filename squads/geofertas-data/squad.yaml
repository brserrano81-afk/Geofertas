## 💡 Optimization Tips

1. **Composite Indexes**: Create for common queries
   ```
   /offers: (storeId, validFrom, price)
   /offers: (productId, validTo, price)
   ```

2. **Caching**: Cache popular searches in Redis
3. **Batch Operations**: Load 100s at a time
4. **Pagination**: Use cursor-based pagination
5. **Archival**: Move old offers to archive collection
