## 📊 Data Model

```yaml
/supermarkets/{storeId}
  - name: String (supermarket name)
  - cnpj: String (tax ID)
  - location: GeoPoint (coordinates)
  - address: String
  - hours: Map (day → hours)
  - phone: String
  - website: String

/products/{productId}
  - name: String (normalized)
  - category: String (main category)
  - subcategories: Array (secondary categories)
  - brand: String
  - upc: String (barcode)
  - unit: String (kg, L, unit)
  - description: String
  - imageUrl: String
  - canonicalId: String (for duplicates)
  - attributes: Map (weight, color, etc)

/offers/{offerId}
  - productId: Reference
  - storeId: Reference
  - price: Number
  - originalPrice: Number (if discount)
  - discount: Number (%)
  - validFrom: Timestamp
  - validTo: Timestamp
  - quantity: Number (if limited)
  - source: String (SEFAZ, website, manual)
  - createdAt: Timestamp
  - updatedAt: Timestamp

/price_history/{productId}/{storeId}
  - date: Timestamp
  - price: Number
  - source: String
  - quantity: Number
```

## 🔄 Data Quality Checks

| Check | Rule | Action if Failed |
|-------|------|-----------------|
| **Price Bounds** | 0.01 - 1000 BRL | Flag for review |
| **Product Name** | Min 3 chars, no symbols | Normalize |
| **Store Location** | Valid Brazil coords | Geocode/validate |
| **Offer Dates** | validFrom < validTo | Reject |
| **Category** | Must exist in taxonomy | Assign default |
| **UPC** | Valid EAN-13 checksum | Flag duplicate |

