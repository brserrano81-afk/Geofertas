# Geofertas WhatsApp Debug Squad

## Mission

Investigar e corrigir regressões do fluxo oficial WhatsApp First, principalmente loops de `AWAITING_INITIAL_LOCATION` e respostas do Amnesia Guard após localização já resolvida.

## Agent

- `.agent/agents/whatsapp-state-guardian.md`

## Critical Flow

`Evolution webhook -> message_inbox -> EvolutionInboxWorker -> ChatService -> ConversationStateService -> UserPreferencesService -> message_outbox`

## Default Runbook

1. Ler print/log do usuário.
2. Mapear estado esperado vs estado real.
3. Inspecionar `ChatService.init()`, `_generateRawResponse()` e `ConversationStateService.load/save()`.
4. Confirmar persistência de `userLocation` ou `neighborhood`.
5. Corrigir com patch mínimo.
6. Adicionar contrato em `tests/integration/whatsapp-location-contract.test.mjs`.
7. Rodar build + contratos + teste WhatsApp.

## Success Criteria

- Usuário que já mandou GPS ou bairro não recebe novo pedido inicial de localização.
- `oi` depois da localização responde saudação normal.
- Produto depois da localização entra no fluxo de preço/lista, não no Amnesia Guard.
- Teste de contrato protege a regressão.
