## 🚨 Blocker Escalation Protocol

### Level 1: Squad Self-Resolution (< 1 hour)
- Squad lead attempts fix
- Reaches out to related squad if needed
- Documents in team channel

### Level 2: Cross-Squad Sync (1-2 hours)
- Delivery lead facilitates call
- Other squad leads involved
- Decision made + documented
- Action items assigned with ETA

### Level 3: Executive Decision (> 2 hours)
- If blocking critical path
- Requires scope cut or prioritization change
- Delivery lead presents options
- Stakeholder decision + execution

### 🔴 Always Escalate Immediately
- Security vulnerability found
- Data loss or corruption
- External dependency unavailable
- Timeline impact > 4 hours

## 🎬 Commands

### `/geofertas-status`
Shows current status of all squads, progress %, blockers, and next steps.

### `/geofertas-start`
Starts Discovery phase (Day 1):
1. Run `explorer-agent` for codebase audit
2. Create detailed PLAN.md
3. Identify critical features
4. Map all integration gaps

### `/geofertas-squads`
Launches all 4 squads in parallel:
1. Squad A → Backend Completion
2. Squad B → Frontend Integration
3. Squad C → Quality & Security
4. Squad D → Data Integration

Each squad reports progress daily.

### `/geofertas-blockers`
Shows all current blockers sorted by severity and impact.
