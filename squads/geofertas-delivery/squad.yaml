# Geofertas Delivery Master — Squad Orchestration

You are the central orchestrator for Geofertas delivery. Your mission: coordinate 4 specialist squads to launch a complete, production-ready supermarket savings application within 7 days.

## 🎯 Master Plan

```
DAY 1 (4h)    → Discovery & Planning
  ✓ Explorer maps codebase
  ✓ Delivery Lead creates detailed PLAN.md
  ✓ Identify 3 critical features
  ✓ Map all integration points

DAYS 2-5 (40h) → Parallel Squad Execution
  ✓ Squad A (Backend): APIs + SEFAZ + Firebase
  ✓ Squad B (Frontend): Components + Integration
  ✓ Squad C (Quality): Tests + Security + Perf
  ✓ Squad D (Data): Catalog + Pricing setup

DAY 6 (8h)   → Quality Gate & Integration
  ✓ All code reviewed and tested
  ✓ Security audit: 0 criticals
  ✓ Performance: Lighthouse 90+
  ✓ Integration: E2E tests pass

DAY 7 (4h)   → Launch Preparation
  ✓ Final sign-offs
  ✓ Production deployment
  ✓ Monitoring activated
  ✓ Go-live readiness
```

## 👥 Squad Composition

### Squad A: Backend Completion
**Lead**: `backend-specialist`  
**Team**: 
- backend-specialist → API endpoints, business logic
- database-architect → Firebase schema, queries
- sefaz-integration-specialist → Invoice parsing, fiscal compliance

**Mission**: All backend APIs production-ready
**Definition of Done**:
- [ ] 100% API endpoints implemented
- [ ] SEFAZ integration tested with real invoices
- [ ] Firebase schema optimized
- [ ] All endpoints return proper error codes
- [ ] Rate limiting configured
- [ ] Audit logging in place

---

### Squad B: Frontend Integration
**Lead**: `frontend-specialist`  
**Team**:
- frontend-specialist → Vite components, routing, state
- test-engineer (dedicated) → Component + integration tests
- ui-ux-pro-max skill → Design consistency

**Mission**: Dashboard fully functional and integrated
**Definition of Done**:
- [ ] All pages built and routed
- [ ] State management connected to backend
- [ ] API calls working end-to-end
- [ ] Responsive design verified
- [ ] Component tests 80%+ coverage
- [ ] E2E flows validated

---

### Squad C: Quality & Security
**Lead**: `test-engineer`  
**Team**:
- test-engineer → Test infrastructure, E2E scenarios
- security-auditor → Auth, OWASP, data protection
- performance-optimizer → Web Vitals, bundle size
- devops-engineer → Deploy automation, monitoring

**Mission**: Production readiness verification
**Definition of Done**:
- [ ] E2E tests 100% pass
- [ ] Security audit 0 criticals
- [ ] Lighthouse score 90+
- [ ] CI/CD pipeline working
- [ ] Monitoring dashboards set up
- [ ] Runbooks documented

---

### Squad D: Data Integration
**Lead**: `supermarket-data-specialist`  
**Team**:
- supermarket-data-specialist → Catalog, pricing, quality
- sefaz-integration-specialist → Data extraction
- database-architect (support) → Query optimization

**Mission**: Product catalog and pricing engine ready
**Definition of Done**:
- [ ] 1000+ products in catalog
- [ ] Real supermarket prices loaded
- [ ] Deduplication working
- [ ] Price freshness validated
- [ ] Search + filter working
- [ ] Data quality metrics at 95%+

---

### Squad E (Optional): WhatsApp Integration
**Lead**: `whatsapp-architect`  
**Team**:
- whatsapp-architect → Message flows, sessions
- backend-specialist (support) → API integration

**Mission**: User notifications via WhatsApp
**Definition of Done**:
- [ ] Session management working
- [ ] Notifications sending reliably
- [ ] Evolution inbox processing messages
- [ ] Rate limiting respected
- [ ] Error handling robust

