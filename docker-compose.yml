version: "3.9"

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: economizafacil-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: "http://localhost:8080"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY:-economizafacil-dev-key}"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Database (uses SQLite by default in dev)
      DATABASE_ENABLED: "false"
      # Webhook global config
      WEBHOOK_GLOBAL_ENABLED: "false"
      WEBHOOK_GLOBAL_URL: ""
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      # WhatsApp settings
      CONFIG_SESSION_PHONE_CLIENT: "EconomizaFacil"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      # Log
      LOG_LEVEL: "ERROR"
      LOG_COLOR: "true"
      LOG_BAILEYS: "error"
      # File storage
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
      # Clean store interval (hours)
      CLEAN_STORE_CLEANING_INTERVAL: "7200"
      CLEAN_STORE_MESSAGES: "true"
      CLEAN_STORE_MESSAGE_UP: "true"
      CLEAN_STORE_CONTACTS: "true"
      CLEAN_STORE_CHATS: "true"
    volumes:
      - evolution_data:/evolution/instances
      - evolution_store:/evolution/store

  redis:
    image: redis:7-alpine
    container_name: economizafacil-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

volumes:
  evolution_data:
  evolution_store:
  redis_data:
